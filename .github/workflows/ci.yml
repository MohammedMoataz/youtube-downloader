name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit + Build + E2E + A11y
    runs-on: ubuntu-latest
    env:
      # Tests run against the bundled mock extraction service.
      PUBLIC_DOWNLOADER_API: http://localhost:8787
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Unit tests
        run: npm run test:unit

      - name: Build (static)
        run: npm run build

      - name: E2E tests
        run: npm run test:e2e

      - name: Accessibility tests (WCAG 2.1 AA)
        run: npm run test:a11y

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Performance budgets (Lighthouse CI)
    runs-on: ubuntu-latest
    env:
      PUBLIC_DOWNLOADER_API: http://localhost:8787
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (static)
        run: npm run build
      - name: Lighthouse CI (budgets in lighthouserc.json)
        run: npm run test:perf
