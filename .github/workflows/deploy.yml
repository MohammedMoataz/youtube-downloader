name: Deploy to GitHub Pages

on:
  # Manual-only for now. Before running this, enable GitHub Pages (Settings → Pages →
  # Source: GitHub Actions), set the PUBLIC_DOWNLOADER_API repo variable, and configure
  # Astro `site`/`base` for project-pages asset paths. See README.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Set this as a repository VARIABLE (Settings → Secrets and variables → Actions → Variables).
      # It is public (no secret). Must point at your live extraction service.
      PUBLIC_DOWNLOADER_API: ${{ vars.PUBLIC_DOWNLOADER_API }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static site
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
