server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Fingerprinted Astro assets are safe to cache forever.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Static multipage site: /download -> /download/index.html, etc.
  location / {
    try_files $uri $uri/ =404;
  }
}
