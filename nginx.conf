server {
  listen 80;
  server_name _;

  # Behind a port mapping / reverse proxy, nginx's default absolute redirects (e.g. adding
  # a trailing slash to a directory request) use the internal listen port (80) and drop the
  # published port. Emitting RELATIVE redirects keeps the browser's real origin + port.
  absolute_redirect off;
  port_in_redirect off;
  server_name_in_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  # Fingerprinted Astro assets are safe to cache forever.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Static multipage site: /download -> /download/index.html, etc.
  location / {
    try_files $uri $uri/ =404;
  }
}
