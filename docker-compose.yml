# Run the full GrabTube stack locally: backend (extraction service) + static front-end.
# The backend starts first and must report healthy before the front-end container starts.
#
#   docker compose up --build           # foreground (Ctrl+C to stop)
#   docker compose up --build -d        # detached
#   docker compose down                 # stop & remove
#
#   Front-end:  http://localhost:8088
#   Backend:    http://localhost:8080   (health: http://localhost:8080/health)
#
# Requires the backend repo checked out as a sibling directory:
#   ../grabtube-extraction-service
# (or change `extractor.build.context` / swap it for the published GHCR image).

services:
  extractor:
    build:
      context: ../grabtube-extraction-service
    image: grabtube-extractor:local
    ports:
      - "8080:8080"
    environment:
      # The browser loads the front-end from http://localhost:8088, so THAT origin
      # is what the backend must allow via CORS (not the compose service name).
      GT_CORS_ORIGINS: "http://localhost:8088"
      GT_MAX_CONCURRENCY: "4"
      GT_RETENTION_MINUTES: "30"
      GT_TMP_DIR: "/tmp/grabtube"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      args:
        # Browser -> backend uses the HOST-published port (the browser is outside the
        # compose network), so this is localhost:8080, not http://extractor:8080.
        PUBLIC_DOWNLOADER_API: "http://localhost:8080"
        BASE_PATH: "/"
    image: grabtube-frontend:local
    ports:
      - "8088:80"
    depends_on:
      extractor:
        condition: service_healthy
    restart: unless-stopped
